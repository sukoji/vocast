<svg xmlns="http://www.w3.org/2000/svg" width="960" height="180" viewBox="0 0 960 180" role="img" aria-label="vocast banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#0f1b2e"/>
      <stop offset="100%" stop-color="#122338"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="180" fill="url(#bg)"/>
  <rect x="0" y="176" width="960" height="4" fill="url(#accent)" opacity="0.55"/>

  <!-- left accent bar -->
  <rect x="48" y="42" width="4" height="96" rx="2" fill="url(#accent)"/>

  <!-- title block -->
  <text x="68" y="88" fill="#f8fafc" font-family="Inter,Segoe UI,Helvetica,Arial,sans-serif" font-size="54" font-weight="700">vocast</text>
  <text x="68" y="118" fill="#94a3b8" font-family="Inter,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="400">Dialect Voice Dataset Pipeline</text>
  <text x="68" y="142" fill="#64748b" font-family="Inter,Segoe UI,Helvetica,Arial,sans-serif" font-size="13">Typecast TTS · Optional RVC · 4-region export</text>

  <!-- subtle waves -->
  <path d="M0 165 C60 150,120 180,180 165 S300 150,360 165" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.35"/>
  <path d="M600 168 C660 153,720 183,780 168 S900 153,960 168" fill="none" stroke="#38bdf8" stroke-width="1.2" opacity="0.35"/>

  <!-- South Korea only -->
  <g transform="translate(640, 18) scale(1.05)" filter="url(#glow)">
    <path d="M58,34 L44,44 L38,62 L40,82 L52,102 L72,116 L96,112 L112,94 L114,72 L104,50 L84,36 L68,32 Z"
          fill="#0e4f6e" fill-opacity="0.45" stroke="#22d3ee" stroke-width="2"/>
    <!-- region dots (SK only) -->
    <circle cx="48" cy="72" r="5" fill="#a855f7" stroke="#f8fafc" stroke-width="1"/>
    <circle cx="92" cy="66" r="5" fill="#22d3ee" stroke="#f8fafc" stroke-width="1"/>
    <circle cx="50" cy="98" r="5" fill="#10b981" stroke="#f8fafc" stroke-width="1"/>
    <circle cx="94" cy="96" r="5" fill="#3b82f6" stroke="#f8fafc" stroke-width="1"/>
    <text x="56" y="75" fill="#e2e8f0" font-family="Noto Sans KR,Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="11">©­</text>
    <text x="100" y="69" fill="#e2e8f0" font-family="Noto Sans KR,Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="11">Đ</text>
    <text x="58" y="101" fill="#e2e8f0" font-family="Noto Sans KR,Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="11">|</text>
    <text x="102" y="99" fill="#e2e8f0" font-family="Noto Sans KR,Apple SD Gothic Neo,Malgun Gothic,sans-serif" font-size="11">˝Á</text>
  </g>
</svg>
